name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Check Python syntax
        run: |
          python -m py_compile custom_components/dwd_uv_index/*.py
      
      - name: Validate manifest.json
        run: |
          python -c "import json; json.load(open('custom_components/dwd_uv_index/manifest.json'))"
      
      - name: Validate strings.json
        run: |
          python -c "import json; json.load(open('custom_components/dwd_uv_index/strings.json'))"
